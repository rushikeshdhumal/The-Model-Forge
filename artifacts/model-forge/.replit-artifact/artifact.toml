kind = "web"
previewPath = "/"
title = "The Model Forge"
version = "1.0.0"
id = "artifacts/model-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21751

[services.development]
run = "pnpm --filter @workspace/model-forge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/model-forge", "run", "build" ]
publicDir = "artifacts/model-forge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21751"
BASE_PATH = "/"
